<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Rodízio MJ</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<style>



*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}



body{

    font-family:'Poppins',sans-serif;

    min-height:100vh;

    background:
    linear-gradient(
        135deg,
        #8b1a1a,
        #6d1010
    );

    display:flex;

    justify-content:center;

    align-items:center;

    padding:30px;
}


.recuperar-page{

    width:100%;

    max-width:1100px;

    background:white;

    border-radius:30px;

    overflow:hidden;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:50px;

    box-shadow:
    0 20px 50px rgba(0,0,0,.25);
}


.conteudo{

    width:55%;
}

.titulo{

    font-family:'Montserrat',sans-serif;

    font-size:52px;

    color:#8b1a1a;

    margin-bottom:5px;
}

.titulo span{

    font-weight:700;
}

.subtitulo{

    color:#666;

    font-size:18px;

    margin-bottom:35px;
}

.titulo-secundario{

    font-size:34px;

    margin-bottom:20px;
}

.descricao{

    color:#555;

    line-height:1.7;

    margin-bottom:25px;
}

.campo input{

    width:100%;

    padding:18px;

    border:none;

    border-radius:15px;

    background:#f2f2f2;

    font-size:16px;

    margin-bottom:25px;

    transition:.3s;
}

.campo input:focus{

    outline:none;

    background:white;

    box-shadow:
    0 0 0 3px rgba(139,26,26,.15);
}
.botao{

    width:100%;

    padding:18px;

    border:none;

    border-radius:15px;

    background:#8b1a1a;

    color:white;

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;
}
.botao:hover{

    background:#6d1010;

    transform:translateY(-2px);
}
.lado-direito{

    width:35%;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    gap:25px;
}

.balao{

    background:#8b1a1a;

    color:white;

    padding:25px;

    border-radius:20px;

    text-align:center;

    line-height:1.7;

    box-shadow:
    0 10px 25px rgba(0,0,0,.15);
}

.mascote-recuperacao{

    width:180px;

    height:auto;

    filter:
    drop-shadow(
        0 12px 20px rgba(0,0,0,.20)
    );

    transition:.3s;
}

.mascote-recuperacao:hover{

    transform:
    translateY(-5px)
    scale(1.03);
}

@media(max-width:900px){

    .recuperar-page{

        flex-direction:column;

        text-align:center;

        padding:35px;
    }

    .conteudo{

        width:100%;
    }

    .lado-direito{

        width:100%;

        margin-top:35px;
    }

    .titulo{

        font-size:42px;
    }

    .titulo-secundario{

        font-size:28px;
    }

    .mascote-recuperacao{

        width:140px;
    }
}

</style>

<body>

<div class="recuperar-page">

    <div class="conteudo">

        <h1 class="titulo">
            Rodízio <span>MJ</span>
        </h1>

        <p class="subtitulo">Cozinha</p>

        <h2 class="titulo-secundario">
            Esqueceu sua senha?
        </h2>

        <p class="descricao">
            Digite o e-mail utilizado no login e enviaremos um link para redefinir sua senha.
        </p>

        <div class="campo">
            <input
                type="email"
                id="email"
                placeholder="Digite seu e-mail"
            >
        </div>

        <button
            class="botao"
            id="btnEnviar">
            Enviar link de recuperação
        </button>

    </div>

    <div class="lado-direito">

        <div class="balao">
            <p>
                Um e-mail será enviado com o link para alteração da senha.
                <br><br>
                Guarde sua nova senha com segurança.
            </p>
        </div>

        <img
            src="../images/mascote.png"
            alt="Mascote MJ"
            class="mascote-recuperacao"
        >

    </div>

</div>

<script>
const btnEnviar = document.getElementById("btnEnviar");

btnEnviar.addEventListener("click", async () => {

    const email =
        document.getElementById("email").value.trim();

    if (!email) {
        alert("Digite um e-mail válido.");
        return;
    }

    try {

        const resposta = await fetch(
            "http://localhost:3000/recuperar-senha",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email })
            }
        );

        const dados = await resposta.json();

        alert(dados.mensagem);

    } catch (erro) {

        console.error(erro);

        alert(
            "Não foi possível conectar ao servidor."
        );

    }

});
</script>

</body>
</html>
