<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova senha</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="page">

        <!-- Conteúdo -->
        <div class="conteudo">

            <!-- Título mais acima -->
            <div class="topo">
                <h1 class="titulo">
                    <span class="normal">Rodizio</span> <span class="bold">MJ</span>
                </h1>

                <p class="subtitulo">Cozinha</p>
            </div>

            <!-- Restante -->
            <h2 class="titulo-secundario">Insira a nova senha</h2>

            <p class="descricao">Digite uma nova senha:</p>

            <div class="campo">
                <input type="password" placeholder="Digite a nova senha">
            </div>

            <div class="campo">
                <input type="password" placeholder="Confirme a nova senha">
            </div>

            <button class="botao">Enviar</button>

        </div>

        <!-- Mascote -->
        <div class="lado-direito">
            <img src="images/mascote2.png" alt="Mascote">
        </div>

    </div>

</body>
</html>
