<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Rodizio MJ</title>

    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1 class="titulo">
            Rodizio <span>MJ</span>
        </h1>

        <p class="subtitulo">Cozinha</p>

        <h2 class="login-titulo">Login</h2>

        <form>

            <div class="campo">
                <label>Email:</label>
                <input type="email" placeholder="Digite seu email">
            </div>

            <div class="campo">
                <label>Senha:</label>
                <input type="password" placeholder="Digite sua senha">
            </div>

            <p class="esqueci">Esqueci a senha</p>

            <button class="botao">Acessar</button>

        </form>

    </div>

</body>
</html>
