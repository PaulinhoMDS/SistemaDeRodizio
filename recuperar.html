<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha</title>

    <link rel="stylesheet" href="recuperar.css">

    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="page">

        <!-- Conteúdo central -->
        <div class="conteudo">

            <h1 class="titulo">
                Rodizio <span>MJ</span>
            </h1>

            <p class="subtitulo">Cozinha</p>

            <h2 class="titulo-secundario">Esqueceu a senha</h2>

            <p class="descricao">
                Para resetar a senha, digite o email de login:
            </p>

            <div class="campo">
                <input type="email" placeholder="Digite o email">
            </div>

            <button class="botao">Enviar</button>

        </div>

        <!-- Lado direito -->
        <div class="lado-direito">

            <div class="balao">
                <p>
                    Um e-mail será enviado com o link para modificação da senha!<br><br>
                    Lembre-se da nova senha
                </p>
            </div>

            <div class="bolinha b1"></div>
            <div class="bolinha b2"></div>
            <div class="bolinha b3"></div>

            <img src="images/mascote.png" alt="Mascote">

        </div>

    </div>

</body>
</html>
